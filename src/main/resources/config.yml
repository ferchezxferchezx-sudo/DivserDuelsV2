# ========== DUEL SETTINGS ==========
duel:
  # Default duel rules
  default_keep_inventory: false
  default_block_arrows: false
  default_block_fireworks: false
  default_block_potions: false
  default_block_slow_falling: false
  
  # Duel request expiration (in seconds)
  request_expiration: 60
  
  # Duel combat settings
  border_radius: 50
  border_damage: 10
  
# ========== ARENA SETTINGS ==========
arena:
  # Arena configuration
  save_location: "arenas.yml"
  auto_load_on_startup: true
  
# ========== COMMAND SETTINGS ==========
commands:
  enabled: true
  
# ========== SOUND SETTINGS ==========
sounds:
  button_click: true
  button_click_pitch: 1.0
  level_up: true
  level_up_pitch: 1.3
  deny_sound: true
  deny_sound_pitch: 0.8
  pickup_sound: true
  pickup_sound_pitch: 1.5
  arrow_hit: true
  arrow_hit_pitch: 1.0
  accept_request: true
  accept_request_pitch: 0.8

# ========== END OF DUEL SETTINGS ==========
duel_end:
  winner_title: "§6✨ VICTORY ✨"
  winner_subtitle: "§7You defeated §e{loser}§7!"
  loser_title: "§c✗ DEFEAT ✗"
  loser_subtitle: "§7Better luck next time §e{winner}§7!"
  blindness_duration: 3
  sound_enabled: true
  winner_sound: "ENTITY_PLAYER_LEVELUP"
  loser_sound: "ENTITY_WITHER_HURT"
  sound_pitch: 1.3

# ========== PARTICLE SETTINGS ==========
particles:
  arena_center_particles: true
  particle_count: 50
